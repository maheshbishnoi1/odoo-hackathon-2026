# ============================================================
# TransitOps — Application Configuration
# ============================================================
spring.application.name=transitops-backend

# ============================================================
# DATABASE — MySQL
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/transitops?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# FLYWAY
# ============================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ============================================================
# SPRINGDOC / SWAGGER UI
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-actuator=false

# ============================================================
# SPRING SECURITY — OAuth2 Resource Server (JWT)
# Place your Keycloak / Auth-server JWKS URI below
# ============================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/transitops

# ============================================================
# SERVER
# ============================================================
server.port=8080
server.servlet.context-path=/

# ============================================================
# LOGGING
# ============================================================
logging.level.com.odoo.backend=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=INFO 